# Abzum Setup App — self-hosting compose file.
#
# Written to /docker/abzum-setup-app/docker-compose.yml by the bootstrap
# script (install-setup-app.sh) and started with:
#
#   docker compose up -d
#
# The setup app does NOT use `doppler run --` for itself — it reads its own
# secrets (SETUP_APP_SECRET) from a file mounted from the host. Doppler is used
# for managed services, not for the setup app's own startup.

services:
  abzum-setup-app:
    image: ghcr.io/vijaytilak/abzum-setup-app:latest
    container_name: abzum-setup-app
    restart: unless-stopped

    ports:
      # Exposed on the host for initial bootstrap access (before CF tunnel is
      # configured). Once the tunnel + Access app are set up, this port can be
      # firewalled off.
      - "3000:3000"

    environment:
      NODE_ENV: production
      # Path to the libsodium encryption key written by install-setup-app.sh.
      # The key file is bind-mounted below. Matches SETUP_APP_SECRET_PATH in lib/crypto.ts.
      SETUP_APP_SECRET_PATH: /run/secrets/setup-app-secret

    volumes:
      # SQLite database — persisted on host.
      - /opt/abzum-setup-app/data:/opt/abzum-setup-app/data

      # Encryption key — read-only, written once by install script.
      - /etc/abzum-setup-app/secret:/run/secrets/setup-app-secret:ro

      # Docker socket — required for compose up/down/logs of managed services.
      - /var/run/docker.sock:/var/run/docker.sock

      # Managed service compose directories — setup app writes here.
      - /docker:/docker

      # Doppler CLI scope config — lets `doppler run --` work without
      # re-authenticating on every invocation.
      - /root/.doppler:/root/.doppler:ro

    networks:
      - proxy

    # Ensure the setup app starts after Docker's own networking is ready.
    # (No depends_on needed since cloudflared / other services are separate.)

networks:
  proxy:
    external: true
